# scan-tagger configuration
# Environment variables override these values.

watch_path: /scans

# --- LLM Provider ---
# "openai" or "azure"
llm_provider: openai

# OpenAI settings (when llm_provider: openai)
# openai_api_key: set via OPENAI_API_KEY env var
openai_model: gpt-4o
# openai_base_url: optional, for OpenAI-compatible APIs (e.g. ollama)

# Azure OpenAI settings (when llm_provider: azure)
# azure_openai_endpoint: https://your-resource.openai.azure.com
# azure_openai_api_key: set via AZURE_OPENAI_API_KEY env var
# azure_openai_deployment: gpt-4o
# azure_openai_api_version: "2025-04-01-preview"

# How long (seconds) between size/mtime checks while waiting for SMB writes
stabilization_delay: 3.0
# How many consecutive unchanged size+mtime checks before validating the file
stabilization_checks: 3
# Max seconds to wait for a scan to finish uploading before giving up
stabilization_timeout: 300.0

# Auto-correct rotated scans (landscape docs scanned in portrait) via Tesseract OSD
reorient_enabled: true
# Minimum OSD orientation confidence required before rotating (higher = safer)
min_orientation_confidence: 1.0

max_summary_words: 4

supported_extensions:
  - .pdf
  - .jpg
  - .jpeg
  - .png
  - .tiff
  - .tif

# Set true to rename existing files in the watch directory on startup
process_existing: false

log_level: INFO

# --- Notifications ---
# Discord webhook URL (leave empty to disable)
# discord_webhook_url: https://discord.com/api/webhooks/...

# Signal recipient phone number (leave empty to disable)
# Uses signal-cli daemon on localhost:7583
# signal_recipient: "+15551234567"
# signal_port: 7583

# Send a notification on every successful rename (set false for failures-only)
notify_on_success: true

# Send a startup notification when the service starts
notify_on_startup: true

# Hour (0-23) to send daily summary (local time)
daily_summary_hour: 20
